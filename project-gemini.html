    <!-- Script Block for rendering chats -->
    <script>
        (function() {
            window.initGeminiChats = function(containerParent) {
                const context = containerParent || document;
                const chatListEl = context.querySelector('#chat-list');
                const chatMessagesEl = context.querySelector('#chat-messages');
                const chatTitleEl = context.querySelector('#active-chat-title');
                const chatDateEl = context.querySelector('#active-chat-date');

                if (!chatListEl || !chatMessagesEl) return;

                fetch('assets/chats_data.json')
                    .then(res => {
                        if (!res.ok) throw new Error("JSON file could not be loaded");
                        return res.json();
                    })
                    .then(data => {
                        renderChatList(data, chatListEl, chatMessagesEl, chatTitleEl, chatDateEl);
                    })
                    .catch(err => {
                        console.error("Error loading chat JSON:", err);
                        chatListEl.innerHTML = `<div style="color: var(--color-text-secondary); padding: 20px 0;">Error loading chats.</div>`;
                    });
            };

            function renderChatList(data, chatListEl, chatMessagesEl, chatTitleEl, chatDateEl) {
                chatListEl.innerHTML = '';
                if (!data || data.length === 0) {
                    chatListEl.innerHTML = `<div style="color: var(--color-text-secondary); padding: 20px 0;">No conversations found.</div>`;
                    return;
                }

                data.forEach((chat, index) => {
                    const item = document.createElement('button');
                    item.className = 'gemini-chat-item';
                    if (index === 0) item.classList.add('active');

                    item.innerHTML = `
                        <span class="item-date">${chat.date}</span>
                        <h3 class="item-title">${chat.title}</h3>
                        <div class="item-meta">
                            <span class="item-badge">${chat.messages.length} messages</span>
                        </div>
                    `;

                    item.addEventListener('click', () => {
                        document.querySelectorAll('.gemini-chat-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        displayConversation(chat, chatMessagesEl, chatTitleEl, chatDateEl);

                        // Mobile Layout: auto-scroll to messages view
                        if (window.innerWidth <= 767) {
                            const pane = document.querySelector('.gemini-chat-pane');
                            if (pane) {
                                pane.scrollIntoView({ behavior: 'smooth' });
                            }
                        }
                    });

                    chatListEl.appendChild(item);
                });

                // Display the first conversation initially
                displayConversation(data[0], chatMessagesEl, chatTitleEl, chatDateEl);
            }

            function displayConversation(chat, chatMessagesEl, chatTitleEl, chatDateEl) {
                chatTitleEl.textContent = chat.title;
                chatDateEl.textContent = `Session started: ${chat.date} | ID: ${chat.id}`;
                chatMessagesEl.innerHTML = '';

                chat.messages.forEach(msg => {
                    const msgEl = document.createElement('div');
                    msgEl.className = `chat-message ${msg.role}`;

                    const senderLabel = msg.role === 'user' ? 'YOU' : 'GEMINI';
                    let bubbleContent = '';

                    if (msg.role === 'assistant') {
                        // Parse markdown for Gemini response
                        bubbleContent = window.marked ? window.marked.parse(msg.content) : msg.content;
                    } else {
                        // Keep plain text for user inputs
                        bubbleContent = `<p>${msg.content.replace(/\n/g, '<br>')}</p>`;
                    }

                    let thinkingBlock = '';
                    if (msg.role === 'assistant' && msg.thinking && msg.thinking.trim()) {
                        thinkingBlock = `
                            <button class="ai-thinking-toggle" aria-label="Toggle Thinking Process">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                                <span>Show AI Thinking</span>
                            </button>
                            <div class="ai-thinking-content">${msg.thinking}</div>
                        `;
                    }

                    msgEl.innerHTML = `
                        <span class="message-sender">${senderLabel}</span>
                        <div class="message-bubble">${bubbleContent}</div>
                        ${thinkingBlock}
                    `;

                    // Wire up toggle button if thinking process is present
                    const toggleBtn = msgEl.querySelector('.ai-thinking-toggle');
                    if (toggleBtn) {
                        const thinkingContent = msgEl.querySelector('.ai-thinking-content');
                        toggleBtn.addEventListener('click', () => {
                            const isExpanded = thinkingContent.classList.toggle('expanded');
                            toggleBtn.classList.toggle('expanded');
                            toggleBtn.querySelector('span').textContent = isExpanded ? 'Hide AI Thinking' : 'Show AI Thinking';
                        });
                    }

                    chatMessagesEl.appendChild(msgEl);
                });

                // Scroll back to top of chat messages
                chatMessagesEl.scrollTop = 0;

                // Re-bind custom cursor reticle events
                const reticle = document.getElementById('cursor-reticle');
                const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (reticle && !isTouchDevice) {
                    const interactiveElements = chatMessagesEl.querySelectorAll('a, button');
                    interactiveElements.forEach(el => {
                        el.addEventListener('mouseenter', () => {
                            reticle.style.transform = 'translate(-50%, -50%) scale(3.5)';
                        });
                        el.addEventListener('mouseleave', () => {
                            reticle.style.transform = 'translate(-50%, -50%) scale(1)';
                        });
                    });
                }
            }
        })();
    </script>
